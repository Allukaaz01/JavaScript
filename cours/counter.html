<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="contain">
        <h1>Counter Application</h1>
        <div id="compteur">
            0
        </div>
        <div>
            <button onclick="add()">+</button>
            <button onclick="sub()">-</button>
        </div>
        <button onclick="reset()">reset</button>
    </div>
    <script>
        let compteur=0
        function add(){
            compteur++;//compteur+=1
            base();
        }
        function sub(){
            if (compteur>0){
                compteur--;
                base();
            };
        }
        function reset(){
            compteur=0;
            base();
        }
        function base(){
            document.getElementById("compteur").innerHTML=compteur
        }
    </script>
    
</body>
</html>
