<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        label{
            width: 40px;
        }
        #choix{
            width: 18px;
        }
        div{
            margin: 15px;
        }
        .mod{
            padding: 40px;
        }
        .email{
            padding: 55px;
        }
    </style>
</head>
<body>
    <h1>Connectz-vous</h1>
    <div >
        <label class="email">Email</label>
        <input type="email" >
    </div>
    <div>
        <label class="mod">Passeword</label>
        <input type="password" >
        <input type="checkbox" >show/hide
        
        
    </div>
    <script>
        let b=document.querySelector("input[type=checkbox]")
        let pa=document.querySelector("input[type=password]")
        b.addEventListener("click",function(){
            if (b.checked){
                pa.setAttribute("type","text")
            }
            else{
                pa.setAttribute("type","password")
            }
        })
        
    </script>
</body>
</html>
