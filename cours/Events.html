    txt.addEventListener('blur', () => {

    document.addEventListener('keydown', (e) => {
      console.log(e);//l'objet e renvoie des infos sur l'evenement en question. les infos se different selon l'evenement declenche
      console.log(e.type);//le type d'evenement
      console.log(e.key);//la touche enfoncee
      console.log(e.keyCode);//le code ASCII de la touche enfoncee
      console.log(e.target);//l'element sur lequel l'evenement a ete declenche
      if (e.key === 'z' || e.key === 'Z'){
        e.target.style.backgroundColor='purple'
      }
      else if (e.key === 'x' || e.key === 'X'){
        e.target.style.backgroundColor='red';
      }
      else if (e.key === 'c' || e.key === 'C'){
        e.target.style.backgroundColor='lime';
      }
      else if (e.key === 'v' || e.key === 'V'){
        e.target.style.backgroundColor='yellow';
      }
      else if (e.key === 'b' || e.key === 'B'){
        e.target.style.backgroundColor='brown';
      }
      else if (e.key === 'n' || e.key === 'N'){
        e.target.style.backgroundColor='orange';
      }
      else {
        e.target.style.backgroundColor='white';
      }
    })
    const link=document.querySelector('.container a');

    btn.addEventListener('click', mafonction);
