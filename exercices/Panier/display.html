<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Panier</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Aboreto&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    body {
      font-family: Poppins;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    h1 {
      text-align: center;
    }
    table, th, td, tr {
      border: 1px solid grey;
      border-radius: 4px;
      border-collapse: collapse;
      padding: 8px 12px;
    }
    th {
      background-color: rgba(128, 128, 128, 0.145);
    }
    button {
      padding: 8px 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }
    .retour {
      margin-top: 20px;
      float: right;
      background-color: red;
      color: white;
    }
    .retour:hover {
      background-color: rgba(255, 0, 0, 0.657);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mon Panier</h1>
    <table id="panierTable">
      <tr>
        <th>Reference</th>
        <th>Designation</th>
        <th>Prix</th>
      </tr>
    </table>
    <button class="retour">Retour</button>
  </div>

  <script>
    let panierTable = document.getElementById('panierTable');
    let btn = document.querySelector('.retour');

    let panier = JSON.parse(localStorage.getItem('panier')) || [];

    panier.forEach(article => {
      let row = panierTable.insertRow();
      row.insertCell(0).textContent = article.reference;
      row.insertCell(1).textContent = article.designation;
      row.insertCell(2).textContent = article.prix + ' dhs';
    });

    btn.addEventListener('click', () => {
      localStorage.removeItem('panier');
      location.href = 'panier.html';
    });
  </script>
</body>
</html>
