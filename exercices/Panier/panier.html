<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
 <style>
 body{
 padding: 0;
 margin: 0;
 font-family: 'Courier New', Courier, monospace;
 font-size: 24px;
 display: flex;
 align-items: center;
 justify-content: center;
 height: 100vh;
 }
</style>
</head>
<body onload="displayPanier();">
 <div class="container">
 <div id="out"></div> <br>
 <label for="total">Total Commande: </label><span id="total"></span>
 </div>
<script>
 let out=document.querySelector('#out');
 let panier=JSON.parse(localStorage.getItem('panier')) || [];
 function displayPanier()
 {

 let total=0.0;
 let output="<table>";
 output +="<tr><th>Designation</th><th>Prix</th></tr>"
 panier.forEach(ar=>{
 output +=`<tr>
 <td>${ar["designation"]}</td><td>${ar["prix"]}</td>
 </tr>`;
 total +=Number(ar.prix);
 })
 output +="</table>"
 out.innerHTML=output;
 document.getElementById('total').innerHTML=`<strong>${total} Dhs</strong>`
 }
</script>
</body>
</html>
