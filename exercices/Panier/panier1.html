<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Principal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Aboreto&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    body {
      font-family: Poppins;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    h1 {
      text-align: center;
    }
    table, th, td, tr {
      border: 1px solid grey;
      border-radius: 4px;
      border-collapse: collapse;
      padding: 8px 12px;
    }
    th {
      background-color: rgba(128, 128, 128, 0.145);
    }
    button {
      padding: 8px 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }
    .ajouter {
      background-color: blue;
      color: white;
    }
    .ajouter:hover {
      background-color: rgba(0, 0, 255, 0.649);
    }
    .display {
      margin-top: 20px;
      float: right;
      background-color: rgb(17, 140, 8);
      color: white;
    }
    .display:hover {
      background-color: rgba(17, 140, 8, 0.657);
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>Liste des articles</h1>
    <table>
      <tr>
        <th>Reference</th>
        <th>Designation</th>
        <th>Prix</th>
        <th>Action</th> 
      </tr>
      <tr>
        <td id="ref">1111</td>
        <td id="article">Clavier Bilingue</td>
        <td id="prix">29.75 dhs</td>
        <td><button class="ajouter">Ajouter au Panier</button></td>
      </tr>
      <tr>
        <td id="ref">2222</td>
        <td id="article">Souris Optique</td>
        <td id="prix">30.45 dhs</td>
        <td><button class="ajouter">Ajouter au Panier</button></td>
      </tr>
      <tr>
        <td id="ref">3333</td>
        <td id="article">Chaise Ergonomique</td>
        <td id="prix">245.05 dhs</td>
        <td><button class="ajouter">Ajouter au Panier</button></td>
      </tr>
      <tr>
        <td id="ref">4444</td>
        <td id="article">Boitier Marqueur</td>
        <td id="prix">14.25 dhs</td>
        <td><button class="ajouter">Ajouter au Panier</button></td>
      </tr>
    </table>
    <button class="display">Afficher mon Panier</button>
  </div>
  
  <script>
    const articles = [
      {
        'reference':1111,
        'designation': 'Clavier Bilingue',
        'prix': 29.75,
      },
      {
        'reference':2222,
        'designation': 'Souris Optique',
        'prix': 30.45,
      },
      {
        'reference':3333,
        'designation': 'Chaise Ergonomique',
        'prix': 245.05,
      },
      {
        'reference':4444,
        'designation': 'Boitier Marqueur',
        'prix': 14.25,
      }
    ];
    let btn1 = document.querySelectorAll('.ajouter');
    let btn2 = document.querySelector('.display');

    btn1.forEach((button, index) => {
      button.addEventListener('click', () => {
        let article = articles[index];
        let panier = JSON.parse(localStorage.getItem('panier')) || [];
        panier.push(article);
        localStorage.setItem('panier', JSON.stringify(panier));
        alert("Ajout de l'article avec succès");
      });
    });

    btn2.addEventListener('click', () => {
      location.href = 'display.html';
    });
  </script>
</body>
</html>
