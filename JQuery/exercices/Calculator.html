<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator JQuery</title>
  <script src="../jquery-4.0.0.min.js"></script>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.1rem;
    }
    tr, td {
      padding: 8px 10px;
    }
    label {
      font-weight: bold;
    }
    select, input {
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid #00000051;
    }
    select {
      cursor: pointer;
    }
    
    button:hover {
      background-color: rgba(49, 100, 241, 0.8);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Simple Calculatrice JQuery</h1>
    <form action="#">
      <table>
        <tr>
          <td><label for="nb1">Taper le 1er nombre: </label></td>
          <td><input type="number" id="nb1"></td>
        </tr>
        <tr>
          <td><label for="nb2">Taper le 2eme nombre: </label></td>
          <td><input type="number" id="nb2"></td>
        </tr>
        <tr>
          <td><label for="op">Choisir une operation</label></td>
          <td><select name="op" id="op">
            <option value="add">Somme</option>
            <option value="sub">Difference</option>
            <option value="mult">Multiplication</option>
            <option value="div">Divsion</option>
          </select></td>
        </tr>
        <tr>
          <td style="text-align: center;" colspan="2"><button id="btn">Calculer</button></td>
        </tr>
      </table>
    </form>
    <div id="output"></div>
  </div>

  <script>
    $(document).ready(function(){
      let nb1=$('#nb1')
      let nb2=$('#nb2')
      let select=$('#op')
      let output=$('#output')
      $('#btn').on('click', function(){
        switch(select.val()) {
                case "add": 
                        let som=Number(nb1.val())+Number(nb2.val());
                        output.html(`La somme est: ${som}`);
                        break;

                case "sub": 
                        let sous=Number(nb1.val())-Number(nb2.val());
                        output.html(`La difference est: ${sous}`);
                        break;
                case "mult": 
                        let mult=Number(nb1.val())*Number(nb2.val());
                        output.html(`Le produit est: ${mult}`);
                        break;

                case "div": 
                    if(Number(nb2.val())===0){
                        alert("Division impossible par 0");
                        break;
                    }
                        let div=Number(nb1.val())/Number(nb2.val());
                        output.html(`Le quotient est: ${div}`);
                        break;
            }
      })
    })
  </script>
</body>
</html>
